server:
  port: 8080

spring:
  application:
    name: nanobank-ledger

  jackson:
    property-naming-strategy: SNAKE_CASE

  # Default profile uses H2 for quick local testing
  # Override with SPRING_PROFILES_ACTIVE=dev for PostgreSQL
  datasource:
    url: jdbc:h2:mem:nanobank
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
jwt:
  access-token:
    expiration: 900000  # 15 minutes in milliseconds
    secret: ${JWT_ACCESS_SECRET:default-dev-access-secret-key-change-in-production-32chars}
  refresh-token:
    expiration: 604800000  # 7 days in milliseconds

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
