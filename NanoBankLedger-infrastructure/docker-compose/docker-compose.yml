version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nanobank-postgres
    environment:
      POSTGRES_DB: nanobank_ledger
      POSTGRES_USER: nanobank
      POSTGRES_PASSWORD: nanobank_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanobank -d nanobank_ledger"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nanobank-network

  backend:
    build:
      context: ../../NanoBankLedger-backend
      dockerfile: Dockerfile
    container_name: nanobank-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nanobank_ledger
      SPRING_DATASOURCE_USERNAME: nanobank
      SPRING_DATASOURCE_PASSWORD: nanobank_dev
      JWT_ACCESS_SECRET: "dXNhcl9kZWZpbmlkb19wYXJhX2xvZ2luX3Bvcl9leGFtZW5fZnNfMXNlY3VyZV9wYXNzd29yZAo="
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nanobank-network

  frontend:
    build:
      context: ../../NanoBankLedger-frontend
      dockerfile: Dockerfile
    container_name: nanobank-frontend
    ports:
      - "4200:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - nanobank-network

networks:
  nanobank-network:
    driver: bridge

volumes:
  postgres_data:
