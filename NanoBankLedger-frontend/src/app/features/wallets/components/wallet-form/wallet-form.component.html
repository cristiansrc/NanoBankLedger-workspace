<div class="modal-overlay" (click)="close.emit()">
  <div class="modal card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ wallet ? 'Editar Billetera' : 'Nueva Billetera' }}</h2>
      <button class="btn-close" (click)="close.emit()">&times;</button>
    </div>

    <form (ngSubmit)="onSubmit()" class="modal-body">
      <div class="field">
        <label for="name">Nombre</label>
        <input id="name" class="input" [(ngModel)]="formData.name" name="name" placeholder="Ej: Ahorros" required />
      </div>

      <div class="field">
        <label for="type">Tipo</label>
        <select id="type" class="input" [(ngModel)]="formData.type" name="type">
          <option value="SAVINGS">Ahorros</option>
          <option value="CHECKING">Corriente</option>
          <option value="INVESTMENT">Inversiones</option>
          <option value="CASH">Efectivo</option>
        </select>
      </div>

      <div *ngIf="!wallet" class="field">
        <label for="initial_balance">Saldo Inicial (opcional)</label>
        <input id="initial_balance" class="input" type="number" step="0.01" min="0"
               [(ngModel)]="formData.initial_balance" name="initial_balance" placeholder="0.00" />
      </div>

      <div *ngIf="submitError()" class="error-message">{{ submitError() }}</div>

      <div class="modal-actions">
        <button type="button" class="btn btn-outline" (click)="close.emit()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="saving() || !formData.name">
          {{ saving() ? 'Guardando...' : (wallet ? 'Guardar Cambios' : 'Crear Billetera') }}
        </button>
      </div>
    </form>
  </div>
</div>
